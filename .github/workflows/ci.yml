name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  version-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify tag matches workspace version
        shell: bash
        run: |
          set -euo pipefail

          workspace_version="$(awk '
            /^\[workspace\.package\]$/ { in_workspace_package = 1; next }
            /^\[/ { in_workspace_package = 0 }
            in_workspace_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              found = 1
              exit
            }
            END { if (!found) exit 1 }
          ' Cargo.toml)"

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "No release tag present; version guard passes for ${GITHUB_REF:-unknown ref}."
            exit 0
          fi

          tag_name="${GITHUB_REF_NAME:-}"
          if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${tag_name} is not a Traverse release tag; version guard passes."
            exit 0
          fi

          tag_version="${tag_name#v}"
          if [[ "${workspace_version}" != "${tag_version}" ]]; then
            echo "Cargo.toml workspace version ${workspace_version} does not match tag ${tag_name}." >&2
            exit 1
          fi

          echo "Cargo.toml workspace version ${workspace_version} matches ${tag_name}."

  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run expedition artifact smoke path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_artifact_smoke.sh

      - name: Run expedition execution smoke path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_execution_smoke.sh

      - name: Run expedition trace smoke path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_trace_smoke.sh

      - name: Run expedition golden path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_golden_path.sh

      - name: Run zero-to-hero acceptance
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/zero_to_hero_acceptance.sh

      - name: Run repository checks
        run: bash scripts/ci/repository_checks.sh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Rust checks
        run: bash scripts/ci/rust_checks.sh

      - name: Check runtime wasm32 core build
        run: cargo check -p traverse-runtime --target wasm32-unknown-unknown --no-default-features

      - name: Run event-driven workflow smoke path
        run: bash scripts/ci/event_driven_workflow_smoke.sh

      - name: Run Rust embedder package conformance
        run: bash scripts/ci/embedder_conformance/rust_package.sh

  web-embedder-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web embedder package dependencies
        working-directory: packages/web/TraverseEmbedder
        run: npm install --no-fund --no-audit

      - name: Build and test web embedder package
        working-directory: packages/web/TraverseEmbedder
        run: npm test

  coverage-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage gate
        run: bash scripts/ci/coverage_gate.sh

  stress-test:
    name: ThreadPoolExecutor stress (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run ThreadPoolExecutor stress tests
        env:
          TRAVERSE_STRESS_SECONDS: "60"
        run: cargo test -p traverse-runtime --test thread_pool_stress -- --ignored --nocapture

  publish:
    name: Publish to crates.io
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - version-guard
      - repository-checks
      - coverage-gate
      - stress-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          TRAVERSE_PUBLISH_DRY_RUN_BEFORE: "1"
        run: bash scripts/ci/publish_crates.sh

  pr-hygiene:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Save PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body",""))' \
            > /tmp/pr-body.md

      - name: Validate PR body sections
        run: bash scripts/ci/pr_body_check.sh /tmp/pr-body.md

  spec-alignment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Save PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body",""))' \
            > /tmp/pr-body.md

      - name: Run spec alignment check
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/spec_alignment_check.sh /tmp/pr-body.md
