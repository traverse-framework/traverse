name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  version-guard:
    name: Version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo.toml version matches tag (on tag pushes only)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${TAG#v}"
            CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
              echo "error: tag $TAG does not match Cargo.toml version $CARGO_VERSION" >&2
              exit 1
            fi
            echo "Version guard passed: $CARGO_VERSION matches tag $TAG"
          else
            echo "No version tag present — skipping version check"
          fi

  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run expedition artifact smoke path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_artifact_smoke.sh

      - name: Run expedition execution smoke path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_execution_smoke.sh

      - name: Run expedition trace smoke path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_trace_smoke.sh

      - name: Run expedition golden path
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/expedition_golden_path.sh

      - name: Run zero-to-hero acceptance
        run: TRAVERSE_REPO_ROOT="$PWD" bash scripts/ci/zero_to_hero_acceptance.sh

      - name: Run repository checks
        run: bash scripts/ci/repository_checks.sh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Rust checks
        run: bash scripts/ci/rust_checks.sh

      - name: Run event-driven workflow smoke path
        run: bash scripts/ci/event_driven_workflow_smoke.sh

  coverage-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage gate
        run: bash scripts/ci/coverage_gate.sh

  pr-hygiene:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body",""))' \
            > /tmp/pr-body.md

      - name: Validate PR body sections
        run: bash scripts/ci/pr_body_check.sh /tmp/pr-body.md

  spec-alignment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body",""))' \
            > /tmp/pr-body.md

      - name: Run spec alignment check
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/spec_alignment_check.sh /tmp/pr-body.md
